    <header class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-[100] transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <a href="/" class="flex items-center gap-2 cursor-pointer text-decoration-none">
                    <img src="{{LOGO_URL}}" alt="{{LOGO_TEXT}}" class="h-8 w-auto" loading="lazy" decoding="async" width="32" height="32">
                    <span class="logo-text text-transparent bg-clip-text bg-gradient-to-r from-cyan-600 to-blue-600 font-extrabold text-2xl tracking-tight">{{LOGO_TEXT}}</span>
                    <span class="logo-badge ml-1 text-red-500 text-lg animate-pulse drop-shadow-sm">{{LOGO_BADGE}}</span>
                </a>

                <nav class="desktop-nav-container items-center gap-1" id="desktop-nav">
                </nav>

                <div class="flex items-center gap-2 relative">
                    <button id="search-btn" class="p-3 text-slate-500 hover:text-cyan-600 transition-colors" aria-label="Search">
                        <i data-lucide="search" class="w-5 h-5"></i>
                    </button>
                    <!-- Search Overlay/Input -->
                    <div id="search-container" class="absolute right-0 top-full mt-2 w-64 bg-white border border-slate-200 rounded-lg shadow-lg opacity-0 pointer-events-none transition-all duration-200 z-[101]">
                        <input type="text" id="search-input" placeholder="Search products..." class="w-full px-4 py-2 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500 text-slate-700">
                        <div id="search-results" class="absolute top-full right-0 w-full mt-1 bg-white border border-slate-200 rounded-lg shadow-xl max-h-60 overflow-y-auto hidden">
                            <!-- Results will be injected here -->
                        </div>
                    </div>

                    <button id="mobile-menu-btn" class="mobile-menu-btn-container p-3 text-slate-500 hover:text-slate-900" aria-label="Menu">
                        <i data-lucide="menu" id="menu-open-icon" class="w-6 h-6"></i>
                        <i data-lucide="x" id="menu-close-icon" class="w-6 h-6 hidden"></i>
                    </button>
                </div>
            </div>

        </div>
    </header>

    <!-- Mobile Menu Backdrop -->
    <div id="mobile-menu-backdrop" class="fixed inset-0 bg-slate-900/50 z-[150] hidden md:hidden backdrop-blur-sm transition-opacity duration-300 opacity-0 pointer-events-none"></div>

    <!-- Mobile Menu Sidebar -->
    <div id="mobile-menu" class="fixed top-0 right-0 bottom-0 w-[80%] max-w-[300px] bg-white border-l border-slate-200 hidden md:hidden flex flex-col shadow-2xl z-[200]" aria-hidden="true">
        <div class="h-16 flex items-center justify-between px-6 border-b border-slate-200">
            <span class="text-slate-900 font-bold">Menu</span>
            <button onclick="closeMobileMenu()" class="p-2 text-slate-500 hover:text-slate-900 transition-colors">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 space-y-2 scrollbar-hide" id="mobile-nav-items">
        </div>
        <div class="p-4 border-t border-slate-200 bg-white/50 backdrop-blur-xl">
             <button onclick="openPopup()" class="w-full flex items-center justify-center gap-2 bg-gradient-to-r from-cyan-600 to-blue-600 text-white font-bold py-3 rounded-xl shadow-lg shadow-cyan-500/20">
                <i data-lucide="message-circle" class="w-4 h-4"></i> {{POPUP_TITLE}}
            </button>
        </div>
    </div>
